<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home - polymer-ml-platform</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            height: 100vh;
            text-align: center;
        }

        .header {
            background-color: #333;
            color: white;
            padding: 10px 0;
            width: 100%;
            font-size: 24px;
        }

        .header a {
            color: white;
            text-decoration: none;
        }

        .button-container {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin: 20px 0;
        }

        .button-container button {
            background-color: #555;
            color: white;
            padding: 12px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            transition: background-color 0.3s ease;
        }

        .button-container button:hover {
            background-color: #777;
        }

        .welcome-text {
            font-size: 230px; /* 控制WELCOME字的大小 */
            color: #333;
            margin-top: auto;
            margin-bottom: 20vh; /* 控制與底部的距離 */
        }
    </style>
</head>
<body>
    <div class="header"><a href="index.html">Fast Prediction for Organic Solar Cells</a></div>

    <div class="button-container">
        <div class="image-button">
            <button onclick="location.href='123.html'" class="image-button">
                <img src="Epoxy.jpg" alt="Epoxy Resin Curing Agent" style="width:100px; height:100px;">
                <span class="image-text">Epoxy Resin Curing Agent</span>
            </button>
        </div>
        <div class="image-button">
            <button onclick="location.href='123.html'" class="image-button">
                <img src="CO2.png" alt="CO2 Reduction" style="width:100px; height:100px;">
                <span class="image-text">CO2 Reduction</span>
            </button>
        </div>
        <div class="image-button">
            <button onclick="location.href='home.html'" class="image-button">
                <img src="Solar.jpg" alt="Polymer Solar Cell" style="width:100px; height:100px;">
                <span class="image-text">Polymer Solar Cell</span>
            </button>
        </div>
        <div class="image-button">
            <button onclick="location.href='123.html'" class="image-button">
                <img src="Led.jpg" alt="Polymer Light Emitting Diodes" style="width:100px; height:100px;">
                <span class="image-text">Polymer Light Emitting Diodes</span>
            </button>
        </div>
    </div>
    

    <div class="welcome-text">WELCOME</div> <!-- WELCOME字样放在指定位置 -->
</body>
</html>
